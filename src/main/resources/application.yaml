spring:
  application:
    name: ai-code-mother
  session:
    store-type: redis
    # session 30天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.50.180:3306/ai_code_mother
    username: root
    password: 123456
  # redis
  data:
    redis:
        host: 192.168.50.180
        port: 6379
        username: default
        password: 123456
        ttl: 3600
        database: 0
  profiles:
    active: test

server:
  port: 8080
  servlet:
    context-path: /api
    # cookie 30天过期
    session:
      cookie:
        max-age: 2592000


# springdoc-openapi项目配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.example.aicodemother.controller
knife4j:
  enable: true
  setting:
    language: zh_cn

code:
  deploy-host: http://localhost


